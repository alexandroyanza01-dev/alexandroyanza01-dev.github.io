<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Foto Espacial Tecnológica</title>
  <style>
    :root {
      --bg: #020617;
      --panel: rgba(0, 0, 0, 0.7);
      --text: #ffffff;
      --accent: #ffd60a; /* Color amarillo estilo iOS */
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      overscroll-behavior: none;
      touch-action: manipulation;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      background: radial-gradient(circle at top, #0f172a 0%, #020617 58%, #000 100%);
    }

    /* Lienzos de Renderizado */
    #sceneHolder, #finalCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    #video { position: absolute; opacity: 0; pointer-events: none; }

    /* =========================================
       NUEVA UI ESTILO CÁMARA DE CELULAR
       ========================================= */
    .camera-ui {
      position: absolute;
      inset: 0;
      pointer-events: none; /* Deja que los clics pasen al canvas si es necesario */
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      z-index: 10;
    }

    /* Barra Superior */
    .top-bar {
      background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
      padding: max(20px, env(safe-area-inset-top)) 20px 20px;
      pointer-events: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .status-text {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 5px;
      opacity: 0.8;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; }
    .dot.warn { background: #f59e0b; }
    .dot.off { background: #ef4444; }

    .btn-top {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 8px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Barra Inferior */
    .bottom-bar {
      background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.6) 70%, transparent 100%);
      padding: 20px 30px max(40px, env(safe-area-inset-bottom));
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .mode-text {
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
    }

    .controls-row {
      display: flex;
      width: 100%;
      max-width: 450px;
      justify-content: space-between;
      align-items: center;
    }

    .left-controls {
      display: flex;
      gap: 15px;
      align-items: center;
      width: 80px; /* Para mantener balance visual con el lado derecho */
    }

    /* Miniatura (Preview) */
    .preview-thumb {
      width: 44px;
      height: 44px;
      border-radius: 6px;
      background: #222;
      border: 1.5px solid rgba(255,255,255,0.4);
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .preview-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.3s;
    }

    /* Botón Descargar Extra */
    .btn-download {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      backdrop-filter: blur(5px);
      transition: background 0.2s, transform 0.1s;
      opacity: 0; /* Oculto hasta que haya foto */
      pointer-events: none;
    }
    .btn-download.active {
      opacity: 1;
      pointer-events: auto;
    }
    .btn-download:active { transform: scale(0.9); background: rgba(255,255,255,0.3); }

    /* Botón Obturador Central */
    .btn-shutter {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: white;
      border: 4px solid black;
      box-shadow: 0 0 0 3px white;
      cursor: pointer;
      outline: none;
      transition: transform 0.1s;
    }
    .btn-shutter:active { transform: scale(0.93); }

    /* Botón Cambiar Cámara */
    .btn-switch {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      backdrop-filter: blur(5px);
      transition: background 0.2s, transform 0.1s;
    }
    .btn-switch:active { transform: scale(0.9); background: rgba(255,255,255,0.3); }

    /* Iconos SVG */
    svg { width: 22px; height: 22px; fill: currentColor; }

    /* Efecto Flash */
    .flash-effect {
      position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 100;
    }
  </style>
</head>
<body>

  <div id="app">
    <div class="flash-effect" id="flash"></div>
    
    <!-- Lienzos -->
    <div id="sceneHolder"></div>
    <canvas id="finalCanvas"></canvas>
    <video id="video" autoplay playsinline muted></video>

    <!-- UI Cámara Celular -->
    <div class="camera-ui">
      
      <!-- TOP BAR -->
      <div class="top-bar">
        <div class="status-group">
          <span class="status-text"><div class="dot warn" id="camDot"></div> CÁMARA</span>
          <span class="status-text"><div class="dot off" id="gyroDot"></div> GIROSCOPIO</span>
        </div>
        <button class="btn-top" id="btnGyro">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm3-8c0 1.66-1.34 3-3 3s-3-1.34-3-3 1.34-3 3-3 3 1.34 3 3z"/></svg>
          Activar Movimiento
        </button>
      </div>

      <!-- BOTTOM BAR -->
      <div class="bottom-bar">
        <div class="mode-text">FOTO</div>
        
        <div class="controls-row">
          
          <div class="left-controls">
            <!-- Miniatura -->
            <div class="preview-thumb">
              <img id="preview" src="" alt="Thumbnail" />
            </div>
            
            <!-- Botón Extra Descargar -->
            <button class="btn-download" id="btnDownload" title="Descargar Imagen">
              <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
            </button>
          </div>

          <!-- Botón de Captura Central -->
          <button class="btn-shutter" id="btnCapture"></button>

          <!-- Botón Cambiar Cámara Derecha -->
          <button class="btn-switch" id="btnSwitch">
            <svg viewBox="0 0 24 24"><path d="M20 4h-3.17L15 2H9L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-8 13c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.65 0-3 1.35-3 3s1.35 3 3 3 3-1.35 3-3-1.35-3-3-3z"/></svg>
          </button>
          
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"></script>

  <script>
    // --- VARIABLES GLOBALES DE LA UI ---
    const video = document.getElementById("video");
    const finalCanvas = document.getElementById("finalCanvas");
    const finalCtx = finalCanvas.getContext("2d");
    const sceneHolder = document.getElementById("sceneHolder");
    
    // Botones UI
    const previewImg = document.getElementById("preview");
    const btnCapture = document.getElementById("btnCapture");
    const btnDownload = document.getElementById("btnDownload");
    const btnSwitch = document.getElementById("btnSwitch");
    const btnGyro = document.getElementById("btnGyro");
    const flash = document.getElementById("flash");

    // Marcas de agua
    const WATERMARK_TEXT = "CASA ABIERTA DE HERRAMIENTAS TECNOLÓGICAS 2025-2026";
    const LOGO_SRC_REMOTE = "https://admin.ueliceopolicialnorte.edu.ec/local/public/images/pagina/logo1766854495.png";
    const watermarkLogo = new Image();
    watermarkLogo.crossOrigin = "anonymous";
    let watermarkLogoReady = false;
    watermarkLogo.onload = () => { watermarkLogoReady = true; };
    watermarkLogo.src = LOGO_SRC_REMOTE;

    // Estados
    let lastPhoto = "";
    let videoReady = false;
    let gyroEnabled = false;
    let currentFacingMode = "environment";
    let orientationX = 0, orientationY = 0;
    let pointerX = 0, pointerY = 0;

    // --- CONFIGURACIÓN DE THREE.JS (Tú Código Original Adaptado) ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020617);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.6, 7.4);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, preserveDrawingBuffer: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    sceneHolder.appendChild(renderer.domElement);

    const spaceGroup = new THREE.Group();
    scene.add(spaceGroup);

    // Entorno espacial básico (se asume de tu código)
    const nebula = new THREE.Group(); scene.add(nebula);
    const stars = new THREE.Group(); scene.add(stars);
    let floatingLogo = null; // En tu código original, este era un logo flotante

    // Planetas de demostración en spaceGroup
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const pointLight = new THREE.PointLight(0x38bdf8, 2);
    pointLight.position.set(5, 5, 5);
    scene.add(pointLight);

    for(let i=0; i<3; i++){
      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.8, 32, 32), 
        new THREE.MeshStandardMaterial({color: Math.random() * 0xffffff})
      );
      mesh.position.set((Math.random() - 0.5) * 8, Math.random() * 2, (Math.random() - 0.5) * -5 - 2);
      spaceGroup.add(mesh);
    }

    // Estrellas
    const starGeo = new THREE.BufferGeometry();
    const starPos = [];
    for(let i=0; i<500; i++) {
      starPos.push((Math.random()-0.5)*20, (Math.random()-0.5)*20, (Math.random()-0.5)*20);
    }
    starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
    stars.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.05})));

    // Eventos de ratón/toque para parallax
    window.addEventListener("mousemove", (e) => {
      pointerX = (e.clientX / window.innerWidth) * 2 - 1;
      pointerY = -(e.clientY / window.innerHeight) * 2 + 1;
    });

    // --- FUNCIONALIDAD CÁMARA Y UI ---
    async function startCamera(mode) {
      document.getElementById("camDot").className = "dot warn"; // Cargando
      try {
        if (window.currentStream) {
          window.currentStream.getTracks().forEach(t => t.stop());
        }
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: mode, width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        });
        window.currentStream = stream;
        video.srcObject = stream;
        videoReady = true;
        document.getElementById("camDot").className = "dot"; // Listo
      } catch (e) {
        console.error(e);
        document.getElementById("camDot").className = "dot off"; // Error
      }
    }

    // Acción de Capturar (Obturador)
    btnCapture.addEventListener("click", () => {
      // 1. Efecto Flash Blanco
      flash.style.opacity = "1";
      setTimeout(() => flash.style.opacity = "0", 100);

      // 2. Crear Imagen
      const dataUrl = createWatermarkedCapture();
      lastPhoto = dataUrl;
      
      // 3. Actualizar Miniatura
      previewImg.src = dataUrl;
      previewImg.style.opacity = "1";

      // 4. Mostrar Botón Descarga
      btnDownload.classList.add("active");
    });

    // Botón Extra de Descarga
    btnDownload.addEventListener("click", () => {
      if (!lastPhoto) return;
      const link = document.createElement("a");
      link.href = lastPhoto;
      link.download = "Foto_Espacial.png";
      link.click();
    });

    // Cambiar de cámara (Frontal / Trasera)
    btnSwitch.addEventListener("click", () => {
      currentFacingMode = currentFacingMode === "user" ? "environment" : "user";
      startCamera(currentFacingMode);
    });

    // Activar Giroscopio
    btnGyro.addEventListener("click", async () => {
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        try {
          const res = await DeviceOrientationEvent.requestPermission();
          if(res === 'granted') initGyro();
        } catch(e) { console.error(e); }
      } else {
        initGyro();
      }
    });

    function initGyro() {
      window.addEventListener("deviceorientation", (e) => {
        orientationX = (e.gamma / 45) || 0;
        orientationY = ((e.beta - 90) / 45) || 0;
        gyroEnabled = true;
        document.getElementById("gyroDot").className = "dot";
        btnGyro.style.display = "none";
      });
    }

    // Procesar Foto con Marca de Agua
    function createWatermarkedCapture() {
      const exportCanvas = document.createElement("canvas");
      exportCanvas.width = finalCanvas.width;
      exportCanvas.height = finalCanvas.height;
      const ctx = exportCanvas.getContext("2d");
      ctx.drawImage(finalCanvas, 0, 0);
      
      // Barra inferior negra semitransparente
      const barH = exportCanvas.height * 0.1;
      ctx.fillStyle = "rgba(0,0,0,0.6)";
      ctx.fillRect(0, exportCanvas.height - barH, exportCanvas.width, barH);
      
      // Texto
      ctx.fillStyle = "white";
      ctx.font = `bold ${exportCanvas.height * 0.025}px Arial`;
      ctx.textAlign = "center";
      ctx.fillText(WATERMARK_TEXT, exportCanvas.width/2, exportCanvas.height - barH/2 + 8);
      
      // Logo
      if(watermarkLogoReady) {
          const s = barH * 0.7;
          ctx.drawImage(watermarkLogo, 20, exportCanvas.height - barH + (barH-s)/2, s, s);
      }
      return exportCanvas.toDataURL("image/png");
    }

    // --- MEDIAPIPE Y RENDER LOOP (Tú Código Original Adaptado) ---
    const selfieSegmentation = new SelfieSegmentation({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`
    });
    selfieSegmentation.setOptions({ modelSelection: 1 });
    
    selfieSegmentation.onResults((results) => {
      const w = finalCanvas.width;
      const h = finalCanvas.height;
      finalCtx.clearRect(0, 0, w, h);
      
      // 1. Fondo 3D
      finalCtx.drawImage(renderer.domElement, 0, 0, w, h);
      
      // 2. Persona Segmentada
      finalCtx.save();
      const tempCanvas = document.createElement("canvas");
      tempCanvas.width = video.videoWidth;
      tempCanvas.height = video.videoHeight;
      const tCtx = tempCanvas.getContext("2d");
      
      tCtx.translate(tempCanvas.width, 0);
      tCtx.scale(-1, 1); // Espejo

      tCtx.drawImage(results.segmentationMask, 0, 0);
      tCtx.globalCompositeOperation = "source-in";
      tCtx.drawImage(video, 0, 0);
      
      const scale = Math.max(w / video.videoWidth, h / video.videoHeight);
      const dw = video.videoWidth * scale;
      const dh = video.videoHeight * scale;
      finalCtx.drawImage(tempCanvas, (w-dw)/2, (h-dh)/2, dw, dh);
      finalCtx.restore();
    });

    // Bucle de Animación basado en tus fragmentos originales
    function animate() {
      requestAnimationFrame(animate);
      
      if (videoReady && video.readyState >= 2) {
        selfieSegmentation.send({ image: video });
      }
      
      const t = performance.now() * 0.001;
      
      // Animaciones de tu código
      spaceGroup.rotation.y = Math.sin(t * 0.12) * 0.05;
      nebula.rotation.y = t * 0.01;
      stars.rotation.y = t * 0.006;

      spaceGroup.children.forEach((obj, i) => {
        const speed = 0.25 + (i % 5) * 0.05;
        obj.rotation.y += 0.002 * speed;
        obj.rotation.x += 0.001 * speed;
        obj.position.y += Math.sin(t * 0.7 + i) * 0.0005;
      });

      if (floatingLogo) {
        floatingLogo.position.y = -1.9 + Math.sin(t * 1.4 + floatingLogo.userData.floatSeed) * 0.16;
        floatingLogo.rotation.y += 0.008;
        floatingLogo.rotation.z = Math.sin(t * 0.9) * 0.05;
      }

      // Cámara suave
      const xInput = gyroEnabled ? orientationX : pointerX;
      const yInput = gyroEnabled ? orientationY : pointerY;
      
      const targetPos = new THREE.Vector3(
        xInput * 0.95,
        1.6 + (-yInput) * 0.22,
        7.4 + Math.abs(yInput) * 0.8
      );
      
      camera.position.lerp(targetPos, 0.1);
      camera.lookAt(0, 1.45, -1.2);

      renderer.render(scene, camera);
    }

    // Ajuste de pantalla
    window.addEventListener("resize", () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      finalCanvas.width = window.innerWidth * window.devicePixelRatio;
      finalCanvas.height = window.innerHeight * window.devicePixelRatio;
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });

    // Iniciar
    window.dispatchEvent(new Event('resize'));
    startCamera("user"); // Iniciar con cámara frontal por defecto
    animate();

  </script>
</body>
</html>
